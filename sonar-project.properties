# ============================================================
# Configuración de SonarQube - Módulo de Banca Electrónica
# ============================================================
# Este archivo define los parámetros del proyecto para el
# análisis estático de seguridad (SAST) con SonarQube.
# ============================================================

# --- Identificación del Proyecto ---
sonar.projectKey=modulo-banca-electronica
sonar.projectName=Módulo de Banca Electrónica
sonar.projectVersion=1.0.0
sonar.organization=mi-organizacion

# --- Código fuente ---
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# --- Exclusiones ---
# Archivos que no deben analizarse
sonar.exclusions=\
  node_modules/**,\
  coverage/**,\
  *.config.js,\
  **/*.test.js,\
  **/*.spec.js

# Exclusiones de cobertura (archivos de test)
sonar.coverage.exclusions=\
  tests/**,\
  **/*.test.js,\
  **/*.spec.js

# --- Cobertura de código ---
# Ruta al reporte LCOV generado por Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# --- Quality Gate personalizado ---
# Umbrales mínimos requeridos para pasar el análisis
# (estos valores se configuran en la interfaz de SonarQube,
#  aquí se documentan como referencia)
#
# Cobertura de código:          >= 80%
# Líneas duplicadas:            <= 3%
# Bugs:                         = 0 (blocker/critical)
# Vulnerabilidades:             = 0 (blocker/critical)  
# Code Smells (deuda técnica):  <= 30 minutos
# Security Hotspots revisados:  = 100%

# --- Reglas SAST relevantes para banca ---
# SonarQube analiza automáticamente:
#
# SEGURIDAD:
#   - Inyección SQL/NoSQL
#   - Cross-Site Scripting (XSS)
#   - Credenciales hardcodeadas
#   - Algoritmos criptográficos débiles
#   - Entradas no validadas (input validation)
#   - Exposición de datos sensibles en logs
#
# FIABILIDAD:
#   - Null pointer dereferences
#   - Recursos no cerrados
#   - Condiciones siempre true/false
#
# MANTENIBILIDAD:
#   - Funciones muy complejas (complejidad ciclomática)
#   - Código duplicado
#   - Funciones con demasiados parámetros
